disabled_rules:
- identifier_name
- cyclomatic_complexity
- type_body_length
- nesting
- todo
- large_tuple
opt_in_rules:
- empty_count
- empty_string
excluded:
- Shared/messages.pb.swift
line_length:
    warning: 150
    error: 200
    ignores_function_declarations: true
    ignores_comments: true
    ignores_urls: true
function_body_length:
    warning: 300
    error: 500
function_parameter_count:
    warning: 6
    error: 8
file_length:
    warning: 1000
    error: 1500
    ignore_comment_only_lines: true
reporter: "xcode"
