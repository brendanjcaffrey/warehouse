[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
    { id = "trailing-whitespace" },
    { id = "end-of-file-fixer" },
    { id = "check-case-conflict" },
    { id = "fix-byte-order-marker" },
    { id = "mixed-line-ending" },
    { id = "check-symlinks" },
    { id = "check-merge-conflict" },
    { id = "check-executables-have-shebangs" },
]

[[repos]]
hooks = [
    { id = "swiftlint-check", name = "Run swiftlint on ios", description = "Prevents committing ios code with lint violations.", entry = "check_swiftlint.sh", language = "script", files = "^ios/.*\\.swift$", pass_filenames = true },
]
repo = "local"
